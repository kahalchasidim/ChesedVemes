<!DOCTYPE html>
<html lang="he" dir="rtl">

<title>קהל חסד ואמת – Master Board</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Suez+One&display=swap');
  :root { --gold: #c29d6d; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    width: 100vw; height: 100vh; overflow: hidden;
  }

  .master-frame {

    padding: 5px; gap: 8px;

    overflow: hidden;

  /* ── BRANDING BAR ─────────────────────────────────────────────── */

    height: 5.5vh; display: flex; align-items: center;

    font-family: 'Assistant', 'Arial Hebrew', sans-serif;
    direction: ltr; font-weight: 700; white-space: nowrap;

  #WEATHER { color: #ccc; }
  #BSD {
    position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
    font-size: 2.8vh; color: var(--gold);
    font-family: 'Assistant', 'Arial Hebrew', sans-serif; font-weight: 700;
  }

  /* ── CLOCK SECTION ───────────────────────────────────────────── */
  .clock-section {
    height: 18vh; display: flex;
    align-items: center; justify-content: space-between;
    border: 2px solid var(--gold); border-radius: 12px;
    background: #050505; padding: 0; overflow: hidden;
  }
  .status-stack {
    flex: 0 0 24vw; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #050505; overflow: hidden;
    border-radius: 10px 0 0 10px;

    font-size: 5.8vh; line-height: 0.9; white-space: nowrap; padding: 0; margin: 0;

    flex: 1 1 auto; display: flex;

    direction: ltr !important;

  .secs { font-size: 0.75em; opacity: 0.75; color: #fff; font-weight: 700; margin-left: 1px; }
  .left-stack {
    flex: 0 0 26vw; height: 100%;

    overflow: hidden; border-radius: 0 10px 10px 0;
  }
  .message-box {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-evenly;
    text-align: center; padding: 4px 10px;

  .gold-box  { color: var(--gold); background: #050505; }

  #status-sub  { font-size: 3.2vh; color: white; display: block; width: 100%; white-space: normal; line-height: 1.0; }
  #status-kl   { font-size: 3.0vh; color: #aaffcc; display: block; width: 100%; line-height: 1.0; }

  .zemanim-col {

    background: #050505; overflow: hidden;

    display: flex; justify-content: space-between;

  .active-zman { background: var(--gold) !important; }

  #row_special .z-label { color: #00bfa5 !important; }

 * RULE 4   STATUS BOX      Priority: Shabbos > Yom Tov > Motzei Shabbos > Default.
 *                          NO tachanun rule. Default = שמע ישראל / ותן ברכה (no מוריד הטל — Ashkenaz).
 * RULE 5   NIGHT MODE      1:00 AM – 5:00 AM blackout with jumping clock.
 * RULE 6   STAY AWAKE      Night mode disabled when Col D contains "שבועות".
 * RULE 7   OMER BOX        Hierarchy: Moled (9–12:30) > Holiday > Omer count > Summer msg.
 *                          Omer wording: "בעומר" (Ashkenaz).
 * RULE 8   KIDDUSH LEVANA  3 days (72h) after molad → window is 72h–360h.
 *                          Suppressed: Shabbos, Yom Tov, Friday, Nine Days (1–9 Av).
 * RULE 9   CANDLE LIGHTING Teal row in zmanim whenever Col S has a time value.
 *                          Hidden after midnight.
 * RULE 10  SHABBOS IMAGE   p1 rotation freezes on Shabbos image during Shabbos/Yom Tov.
 *                          Flip trigger: sunset (z10) on Friday / Col AA = "Y".
 *                          Resumes after sunset on Motzei Shabbos.
 * RULE 11  LAYOUT          One big image box (left), two text boxes stacked (right).
 * RULE 12  NEW ZMANIM      מעריב = Col T (51 min after sunset). רבינו תם = Col W.
 *                          Both included in active-zman highlight loop.
 * ─────────────────────────────────────────────────────────────────────
 * MOLED FORMAT (moled sheet Col A, no header):
 *   "DayName, Month DD, YYYY, H:MM am/pm and X chalakim"
 * ─────────────────────────────────────────────────────────────────────
 */

// ── HELPERS ───────────────────────────────────────────────────────
function fmtZman(t) {
    if (!t || t.includes("--")) return "--:--";
    let c = t.replace(/(AM|PM|am|pm)/g,"").trim(), p = c.split(':');
    return `${p[0]}:${p[1]}<span class="secs">:${p[2]||"00"}</span>`;
}
function getSec(t, pm) {
    if (!t || t.includes("--")) return 0;
    let p = t.split(':'), h = parseInt(p[0]), m = parseInt(p[1]), s = parseInt(p[2]||0);
    if (pm && h < 12) h += 12;
    return (h*3600) + (m*60) + s;
}

/**
 * addMinutesToTimeStr
 * Takes a time string like "7:34:12" (24h or 12h) and adds `mins` minutes.
 * Returns a formatted 12h-style string "H:MM:SS" suitable for fmtZman().
 * The `isPM` flag tells us if the base time is PM (same logic as getSec).
 */
function addMinutesToTimeStr(t, mins, isPM) {
    if (!t || t.includes("--")) return "--:--";
    let baseSec = getSec(t, isPM);
    if (!baseSec) return "--:--";
    let totalSec = baseSec + (mins * 60);
    // Clamp to 24h just in case
    totalSec = totalSec % 86400;
    let hh = Math.floor(totalSec / 3600);
    let mm = Math.floor((totalSec % 3600) / 60);
    let ss = totalSec % 60;
    // Convert back to 12h display
    let h12 = hh % 12 || 12;
    return `${h12}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function getIso(d) {
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
}
function fit(el, vhStart) {
    if (!el) return;
    let p = el.parentElement, vh = vhStart; el.style.fontSize = vh + "vh";
    while (p.scrollHeight > p.clientHeight && vh > 1.0) { vh -= 0.1; el.style.fontSize = vh + "vh"; }
}

// ── MOLAD PARSING ─────────────────────────────────────────────────
function parseMoladEntry(str) {
    if (!str) return null;
    try {
        let withoutDay = str.replace(/^[^,]+,\s*/, "");
        let parts = withoutDay.match(/^(.+?),\s*(\d+):(\d+)\s*(am|pm)\s+and\s+(\d+)\s+chalakim/i);
        if (!parts) return null;
        let hour = parseInt(parts[2]), min = parseInt(parts[3]);
        let ampm = parts[4].toLowerCase(), chalakim = parseInt(parts[5]);
        let extraSec = Math.round(chalakim * 10 / 3);
        if (ampm === "pm" && hour !== 12) hour += 12;
        if (ampm === "am" && hour === 12) hour = 0;
        let d = new Date(parts[1].trim() + " " + String(hour).padStart(2,"0") + ":" + String(min).padStart(2,"0") + ":00");
        if (isNaN(d.getTime())) return null;
        d.setSeconds(extraSec);
        return d;
    } catch(e) { return null; }
}

// ── KIDDUSH LEVANA (RULE 8) ───────────────────────────────────────
function getKiddushLevana(now, hebDate, isShab, holidayText, dayOfWeek) {
    if (isShab) return false;
    if (holidayText && holidayText.trim() !== "") return false;
    if (dayOfWeek === 5) return false;
    if (isNineDays(hebDate)) return false;
    let nowMs = now.getTime(), bestMolad = null;
    for (let mol of moladList) {
        if (mol && mol.getTime() <= nowMs && (!bestMolad || mol.getTime() > bestMolad.getTime()))
            bestMolad = mol;
    }
    if (!bestMolad) return false;
    let hrs = (nowMs - bestMolad.getTime()) / 3600000;
    return (hrs >= 72 && hrs < 360);
}
function isNineDays(hebDate) {
    if (!hebDate || !hebDate.includes("אב")) return false;
    for (let d of ["א'","ב'","ג'","ד'","ה'","ו'","ז'","ח'","ט'"]) {
        if (hebDate.startsWith(d)) return true;
    }
    return false;
}

// ── RULE 10: SHABBOS IMAGE ────────────────────────────────────────
function updateP1Image(isKodesh) {
    if (isKodesh && !isShabbosImageActive) {
        isShabbosImageActive = true;
        if (p1RotateTimer) { clearInterval(p1RotateTimer); p1RotateTimer = null; }
        if (shabbosPic) {
            $('p4').style.opacity = 0;
            setTimeout(() => {
                $('p4').src = "https://drive.google.com/thumbnail?id=" + shabbosPic + "&sz=w1600";
                $('p4').style.opacity = 1;
            }, 800);
        }
    } else if (!isKodesh && isShabbosImageActive) {
        isShabbosImageActive = false;
        if (p4Images && p4Images.length > 0) {
            if (p1RotateTimer) clearInterval(p1RotateTimer);
            rotateP4();
            p1RotateTimer = setInterval(rotateP4, 15000);
        }
    }
}

// ── CLOCK ─────────────────────────────────────────────────────────
function updateClock() {
    let now = new Date(), hh = (now.getHours() % 12 || 12);
    let mm = String(now.getMinutes()).padStart(2,'0'), ss = String(now.getSeconds()).padStart(2,'0');
    $('CLOCK').innerHTML = `<span class="c-hour">${hh}</span>:<span class="c-unit">${mm}</span>:<span class="c-unit">${ss}</span>`;
    $('ENG_DATE').innerText = now.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

function loadWeather() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=40.598&longitude=-73.765&current_weather=true&temperature_unit=fahrenheit")
    .then(r => r.json())
    .then(d => { if (d.current_weather) $('WEATHER').innerText = " | " + Math.round(d.current_weather.temperature) + "°F"; })
    .catch(err => console.log("Weather error:", err));
}

// ── MAIN UI UPDATE ────────────────────────────────────────────────
function updateUI() {
    let now = new Date();
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    let cSec = (h*3600) + (m*60) + s;
    let dToday = schedule[getIso(now)]; if (!dToday) return;
    let holidayText = dToday.holidayText || "";

    // RULE 6: Stay awake for Shavuos
    let isHolidayStayAwake = holidayText.includes("שבועות");

    // RULE 5: Sleep 1–5 AM
    if (!isHolidayStayAwake && h >= 1 && h < 5) {
        $('SLEEP_OVERLAY').style.display = 'block';
        $('SLEEP_CLOCK').innerText = (h%12||12) + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
        if (s === 0) {
            $('SLEEP_CLOCK').style.left = (Math.floor(Math.random()*70)+5) + "vw";
            $('SLEEP_CLOCK').style.top  = (Math.floor(Math.random()*80)+5) + "vh";
        }
        return;
    } else { $('SLEEP_OVERLAY').style.display = 'none'; }

    // RULE 3: FLIP LOGIC — date and omer flip at SUNSET
    // Apps Script z[] layout: z[0–8]=morning/afternoon, z[9]=Sunset(ColT), z[10]=מעריב(ColU), z[11]=רבינו תם(ColW)
    let sunsetSecs = getSec(dToday.z[9], true);

    // Date flips at sunset: before sunset → use today; at/after sunset → use tomorrow
    let dIso = (cSec >= sunsetSecs) ? getIso(new Date(now.getTime() + 86400000)) : getIso(now);
    let oIso = dIso; // Omer also flips at sunset

    let dOmer  = schedule[oIso] || dToday;
    let dDate  = schedule[dIso] || dToday;

    if (dIso !== lastDateIso) {
        lastDateIso = dIso;
        $('DAY_LABEL').innerText    = DAY_MAP[dDate.day] || dDate.day;
        $('DATE_LABEL').innerText   = dDate.heb;
        $('PARSHA_LABEL').innerText = dDate.parsha ? "פרשת " + dDate.parsha : "";

        // Apps Script z[] layout:
        //   z[0]  עלות השחר       z[1]  הנחת תפילין    z[2]  נץ החמה
        //   z[3]  סוף זק"ש מג"א   z[4]  סוף זק"ש גר"א  z[5]  סוף זמן תפילה
        //   z[6]  חצות היום       z[7]  מנחה גדולה      z[8]  פלג המנחה
        //   z[9]  שקיעה (Col T)   z[10] רבינו תם (Col W)
        //   מעריב = z[9] + 51 min, calculated client-side (no sheet column)

        // Display rows r1–r9: z[0]–z[8] (AM/afternoon zmanim)
        for (let i = 1; i <= 9; i++) {
            $('z'+i).innerHTML = fmtZman(dDate.z[i-1]);
        }
        // r10 = שקיעת החמה → z[9]  (Col T)
        $('z10').innerHTML = fmtZman(dDate.z[9]);
        // r11 = מעריב → sunset (z[9]) + 51 minutes, calculated client-side
        $('z11').innerHTML = fmtZman(addMinutesToTimeStr(dDate.z[9], 51, true));
        // r12 = רבינו תם → z[10]  (Col W)
        $('z12').innerHTML = fmtZman(dDate.z[10]);
    }

    // Candle lighting row
    let candleTime = (dToday.candle || "").trim();
    if (candleTime !== "" && now.getHours() !== 0) {
        $('row_special').style.display = 'flex';
        $('z_spec_time').innerHTML = fmtZman(candleTime);
    } else {
        $('row_special').style.display = 'none';
    }

    // RULE 7: Omer box
    let moledText   = dDate.moled || "";
    let isMoledTime = (cSec >= 32400 && cSec <= 45000);
    let omerKey     = dOmer.omerNum ? String(dOmer.omerNum).trim() : null;
    let summerMsg   = dOmer.clmF || defaultSummerMsg;

    if (isMoledTime && moledText !== "") {
        $('O2').innerText = moledText; $('O_BECHINA').style.display = 'none'; fit($('O2'), 4.2);
    } else if (holidayText !== "") {
        $('O2').innerText = holidayText; $('O_BECHINA').style.display = 'none'; fit($('O2'), 5.0);
    } else if (omerKey) {
        $('O2').innerText = "היום " + (OMER_STRINGS[omerKey] || omerKey + " יום") + " בעומר";
        if (dOmer.bechina) { $('O_BECHINA').innerText = dOmer.bechina; $('O_BECHINA').style.display = 'block'; }
        else { $('O_BECHINA').style.display = 'none'; }
        fit($('O2'), 5.5); fit($('O_BECHINA'), 3.8);
    } else {
        $('O2').innerText = summerMsg; $('O_BECHINA').style.display = 'none'; fit($('O2'), 5.5);
    }

    // RULE 4: Status box
    let hText  = (holidayText || "").trim();
    let dayW   = now.getDay();
    let candleSecs = getSec(candleTime, false);
    if (candleSecs < 43200) candleSecs += 43200;

    let isShab   = (dayW === 5 && cSec >= sunsetSecs) || (dayW === 6 && cSec < sunsetSecs);
    let isYomTov = (dToday.yomtov === "Y");
    let isKodesh = isShab || isYomTov;
    let isMotz   = (dayW === 6 && cSec >= sunsetSecs);

    let head = "", sub = "", cls = "gold-box";
    if (isShab) {
        head = (moledText && isMoledTime) ? "שבת מברכים" : "שבת קודש";
        sub  = hText;
    } else if (hText !== "") {
        head = hText;
        sub  = isMotz ? "ותודיענו" : "";
        cls  = "teal-box";
    } else if (isMotz) {
        head = "מוצאי שבת";
        sub  = "אתה חוננתנו";
    } else {
        head = "ותן ברכה"; sub = "";
    }

    // RULE 8: Kiddush Levana
    let showKL = getKiddushLevana(now, dDate.heb || "", isShab, hText, dayW);
    let klLine = showKL ? `<span id="status-kl">קידוש לבנה</span>` : "";

    let sH = `<div class="message-box ${cls}"><span id="status-head">${head}</span><span id="status-sub">${sub}</span>${klLine}</div>`;
    if (sH !== currentStatusHTML) {
        $('LEFT_MSG').innerHTML = sH; currentStatusHTML = sH;
        fit($('status-head'), 6.2); fit($('status-sub'), 3.2);
        if (showKL) fit($('status-kl'), 3.0);
    }

    // RULE 10: Shabbos image freeze
    updateP1Image(isKodesh);

    // ── Active zman highlight ─────────────────────────────────────
    // Display order on screen vs z[] array:
    //   r1–r9  → z[0]–z[8]  (AM → isPM false)
    //   r10    → z[10]  שקיעה   (PM)
    //   r11    → z[9]   מעריב   (PM)  — displayed AFTER sunset but comes after r10
    //   r12    → z[11]  רבינו תם (PM)
    // Note: מעריב (z[9]) is later in the evening than שקיעה (z[10]),
    //       so chronological order on screen is correct: sunset → מעריב → רבינו תם.
    let zT = [];
    for (let i = 1; i <= 9; i++) zT.push({ id:'r'+i,  sec: getSec(dDate.z[i-1], false) });
    zT.push({ id:'r10', sec: getSec(dDate.z[9],  true) });                      // שקיעה   (Col T)
    zT.push({ id:'r11', sec: getSec(dDate.z[9],  true) + (51 * 60) });          // מעריב   (sunset + 51 min)
    zT.push({ id:'r12', sec: getSec(dDate.z[10], true) });                      // רבינו תם (Col W)

    // Filter out zero/missing times before finding next zman
    let nIdx = zT.findIndex(z => z.sec > cSec && z.sec > 0);
    let tgtId = nIdx !== -1 ? zT[nIdx].id : null;
    if (tgtId !== currentlyHighlightedId) {
        allZRows.forEach(r => r.classList.remove('active-zman'));
        if (tgtId && $(tgtId)) $(tgtId).classList.add('active-zman');
        currentlyHighlightedId = tgtId;
    }
}

// ── DATA LOAD ─────────────────────────────────────────────────────
function loadData() {
    fetch(SCRIPT_URL + "?cb=" + new Date().getTime())
    .then(r => r.json())
    .then(d => {
        if (!d) return;
        schedule         = d.schedule;
        defaultSummerMsg = d.defaultMsg || "";
        shabbosPic       = d.shabbosPic || "";
        if (d.p5) {
            $('p4').src = "https://drive.google.com/thumbnail?id=" + d.p5 + "&sz=w1600";
            $('p4').style.opacity = 1;
        }
        $('ANN').innerText = d.announcements || ""; fit($('ANN'), 4.8);
        moladList = [];
        if (d.moladList && Array.isArray(d.moladList)) {
            for (let entry of d.moladList) { let p = parseMoladEntry(entry); if (p) moladList.push(p); }
        }
    })
    .catch(err => console.log("Data load error:", err));
}

// ── INIT ──────────────────────────────────────────────────────────
setInterval(updateClock, 1000); updateClock();
loadWeather(); setInterval(loadWeather, 900000);
loadData();    setInterval(loadData, 30000);
setInterval(updateUI, 10000); updateUI();
</script>
